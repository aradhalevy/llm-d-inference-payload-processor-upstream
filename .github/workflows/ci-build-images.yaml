name: Build and Push Container Images

on:
  workflow_call:
    inputs:
      image-name:
        required: true
        type: string
      tag:
        required: true
        type: string
      prerelease:
        required: true
        type: boolean

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  build-payload-processor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v7 # v6 df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Build AMD64 image (no push)
        uses: ./.github/actions/docker-build-and-push
        with:
          docker-file: Dockerfile
          tag: ${{ inputs.tag }}
          image-name: ${{ inputs.image-name }}
          registry: ghcr.io/llm-d
          push: 'false'
          buildx-outputs: type=docker,dest=/tmp/payload-processor-image.tar

      - name: Run Trivy scan on AMD64
        uses: ./.github/actions/trivy-scan
        with:
          tarball: /tmp/payload-processor-image.tar

      - name: Push image for both AMD64 and ARM64
        uses: ./.github/actions/docker-build-and-push
        with:
          docker-file: Dockerfile
          tag: ${{ inputs.tag }}
          image-name: ${{ inputs.image-name }}
          registry: ghcr.io/llm-d
          github-token: ${{ github.token }}
          prerelease: ${{ inputs.prerelease }}
          commit-sha: ${{ github.sha }}
          push: 'true'

  push-helm-charts:
    needs: [build-payload-processor]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v7 # v6 df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Log in to GHCR
        uses: docker/login-action@v4 # v4 650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and Push Chart
        uses: ./.github/actions/helm-build-and-push
        with:
          extra_tag: ${{ inputs.tag }}
          image_repository: ${{ inputs.image-name }}
